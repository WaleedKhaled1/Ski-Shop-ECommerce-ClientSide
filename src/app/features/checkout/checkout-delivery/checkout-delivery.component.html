<div class="w-full">
  <mat-radio-group
    (change)="onDeliveryMethodSelected($event.value)"
    [value]="cartService.selectedDelivery()?.id || null"
    aria-label="Select an option"
    class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full"
  >
    @for (method of checkoutService.deliveryMethods; track method.id) {
      <label
        class="bg-white border border-gray-200 shadow-sm p-4 w-full flex items-start rounded-md cursor-pointer hover:bg-gray-300"
      >
        <mat-radio-button
          [value]="method"
          [checked]="cartService.selectedDelivery() === method"
          class="w-full text-wrap"
        >
          <div class="flex flex-col ml-2">
            <strong> {{ method.shortName }} - {{ method.price | currency }} </strong>
            <span class="text-sm text-gray-500 mt-1">
              {{ method.description }}
            </span>
          </div>
        </mat-radio-button>
      </label>
    }
  </mat-radio-group>
</div>
