<div class="flex w-full items-start gap-6 mt-32">
  <div class="w-3/4">
    <mat-stepper
      [linear]="true"
      (selectionChange)="onStepChange($event)"
      class="bg-white border border-gray-200 shadow-sm"
      #stepper
    >
      <mat-step [completed]="completionState().address" label="Address">
        <div id="address-element"></div>
        <div class="flex justify-end mt-1">
          <mat-checkbox [checked]="saveAddress" (change)="onSaveAddressChange($event)">
            Save address for next time
          </mat-checkbox>
        </div>
        <div class="flex justify-between mt-6">
          <button mat-stroked-button routerLink="/shop">Continue Shopping</button>
          <button [disabled]="!completionState().address" mat-flat-button matStepperNext>
            Next
          </button>
        </div>
      </mat-step>

      <mat-step [completed]="completionState().delivery" label="Shipping">
        <app-checkout-delivery
          (deliveryComplete)="handleDeliveryChange($event)"
        ></app-checkout-delivery>
        <div class="flex justify-between mt-6">
          <button mat-stroked-button matStepperPrevious>Back</button>
          <button [disabled]="!completionState().delivery" mat-flat-button matStepperNext>
            Next
          </button>
        </div>
      </mat-step>

      <mat-step [completed]="completionState().payment" label="Payment">
        <div id="payment-element"></div>
        <div class="flex justify-between mt-6">
          <button mat-stroked-button matStepperPrevious>Back</button>
          <button [disabled]="!completionState().payment" mat-flat-button matStepperNext>
            Next
          </button>
        </div>
      </mat-step>

      <mat-step label="Confirmation">
        <app-checkout-review [confirmationToken]="confirmationToken"></app-checkout-review>
        <div class="flex justify-between mt-6">
          <button mat-stroked-button matStepperPrevious>Back</button>
          <button
            [disabled]="loading || !confirmationToken"
            mat-flat-button
            (click)="confirmPayment(stepper)"
          >
            @if (loading) {
              <mat-spinner diameter="20"></mat-spinner>
            } @else {
              Pay {{ cartService.TotalAmount()?.total | currency }}
            }
          </button>
        </div>
      </mat-step>
    </mat-stepper>
  </div>

  <div class="w-1/4">
    <app-order-summary></app-order-summary>
  </div>
</div>
