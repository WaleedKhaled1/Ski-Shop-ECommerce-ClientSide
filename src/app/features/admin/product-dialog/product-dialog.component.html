<h2 mat-dialog-title class="text-xl font-bold p-4 pb-0 text-gray-800">
  {{ data ? 'Edit Product' : 'Add New Product' }}
</h2>

<form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="p-6 space-y-4">
  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold text-gray-700">Product Name</label>
    <input
      formControlName="name"
      type="text"
      class="border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"
    />
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div class="flex flex-col gap-1">
      <label class="text-sm font-semibold text-gray-700">Brand</label>
      <input
        formControlName="brand"
        type="text"
        class="border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"
      />
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-sm font-semibold text-gray-700">Type</label>
      <input
        formControlName="type"
        type="text"
        class="border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"
      />
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold text-gray-700">Description</label>
    <textarea
      formControlName="description"
      rows="3"
      class="border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none resize-none"
    >
    </textarea>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold text-gray-700">Price ($)</label>
    <input
      formControlName="price"
      type="number"
      step="0.01"
      class="border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"
    />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-semibold text-gray-700">Image URL</label>
    <input
      formControlName="pictureUrl"
      type="text"
      class="border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"
    />
  </div>

  <div class="flex justify-end space-x-2 pt-4">
    <button
      type="button"
      mat-dialog-close
      class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg transition"
    >
      Cancel
    </button>
    <button
      type="submit"
      [disabled]="productForm.invalid"
      class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition"
    >
      Save
    </button>
  </div>
</form>
