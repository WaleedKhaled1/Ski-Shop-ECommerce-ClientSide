@if (product) {
  <div class="h-full">
    <mat-card appearance="raised" class="flex flex-col justify-between h-full">
      <div class="w-full h-48 overflow-hidden">
        <img src="{{ product.pictureUrl }}" class="rounded-t-lg w-full h-full object-cover" />
      </div>

      <mat-card-content class="mt-2">
        <h2 class="font-semibold uppercase">{{ product.name }}</h2>
        <p class="font-light">{{ product.price | currency }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button mat-stroked-button class="w-full">
          <mat-icon>add_shopping_cart</mat-icon>
          Add to cart
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
}
